<svg viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded rectangle background -->
  <rect x="2" y="2" width="74" height="74" rx="12" ry="12" fill="none" stroke="currentColor" stroke-width="8"/>
  
  <!-- Maze corridors -->
  <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top left horizontal -->
    <line x1="12" y1="14" x2="26" y2="14"/>
    
    <!-- Top right vertical -->
    <line x1="62" y1="14" x2="62" y2="28"/>
    
    <!-- Middle section -->
    <line x1="28" y1="28" x2="44" y2="28"/>
    <line x1="44" y1="28" x2="44" y2="44"/>
    
    <!-- Right corridor -->
    <line x1="62" y1="44" x2="62" y2="60"/>
    
    <!-- Bottom left -->
    <line x1="12" y1="60" x2="28" y2="60"/>
    <line x1="28" y1="60" x2="28" y2="72"/>
  </g>
  
  <!-- Arrow exiting right -->
  <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="62" y1="48" x2="80" y2="48"/>
    <!-- Arrow head -->
    <line x1="74" y1="42" x2="80" y2="48"/>
    <line x1="74" y1="54" x2="80" y2="48"/>
  </g>
  
  <!-- Text: Alpha Solutions Management -->
  <text x="102" y="32" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="currentColor">Alpha</text>
  <text x="102" y="50" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="currentColor">Solutions</text>
  <text x="102" y="66" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="normal" fill="currentColor" letter-spacing="1.5">MANAGEMENT</text>
</svg>
